<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient — flat dark -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14141F" />
      <stop offset="100%" stop-color="#0A0A0F" />
    </linearGradient>

    <!-- Border — Volt -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8FF00" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#C8FF00" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#C8FF00" stop-opacity="0.6" />
    </linearGradient>

    <!-- Radial Soft Glow behind Nib — Volt -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C8FF00" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#C8FF00" stop-opacity="0" />
    </radialGradient>

    <!-- Left & Right Infinity Loop Gradients — Volt monotonic -->
    <linearGradient id="leftLoopGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#C8FF00" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#C8FF00" stop-opacity="0.5" />
    </linearGradient>

    <linearGradient id="rightLoopGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#C8FF00" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#C8FF00" stop-opacity="0.9" />
    </linearGradient>

    <!-- Metallic Pen Nib Gradient — cool dark grays -->
    <linearGradient id="nibGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A1A25" />
      <stop offset="35%" stop-color="#2A2A3C" />
      <stop offset="50%" stop-color="#35354A" />
      <stop offset="65%" stop-color="#2A2A3C" />
      <stop offset="100%" stop-color="#1A1A25" />
    </linearGradient>

    <!-- Inlay Accent — Volt -->
    <linearGradient id="inlayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8FF00" />
      <stop offset="100%" stop-color="#7A9944" />
    </linearGradient>

    <!-- Drop Shadow Filter for 3D depth -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Squircle App Icon Background -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="4" filter="url(#dropShadow)" />

  <!-- Soft Ambient Center Glow -->
  <circle cx="256" cy="270" r="180" fill="url(#glowGrad)" />

  <!-- 3D Layer 1: Left Infinity Loop (Passes Behind Pen Nib) -->
  <path d="M 256 340 C 200 280 110 280 110 340 C 110 400 200 400 256 340" 
        fill="none" 
        stroke="url(#leftLoopGrad)" 
        stroke-width="26" 
        stroke-linecap="round"
        filter="url(#softGlow)" />

  <!-- 3D Layer 2: Pen Nib (Middle Layer) -->
  <g filter="url(#dropShadow)">
    <!-- Main Nib Body -->
    <path d="M 256 340 L 196 230 L 196 140 C 196 120 216 100 256 100 C 296 100 316 120 316 140 L 316 230 Z" 
          fill="url(#nibGrad)" 
          stroke="#1F2421" 
          stroke-width="2" />

    <!-- Inlay Accent (Volt Core) -->
    <path d="M 256 295 L 216 220 L 216 150 C 216 140 226 130 256 130 C 286 130 296 140 296 150 L 296 220 Z" 
          fill="url(#inlayGrad)" />

    <!-- Nib Left Side Highlight -->
    <path d="M 198 140 L 198 228 L 208 215 L 208 140 Z" 
          fill="#FFFFFF" 
          opacity="0.08" />

    <!-- Breather Hole -->
    <circle cx="256" cy="200" r="10" fill="#0A0A0F" stroke="#1F2421" stroke-width="1.5" />

    <!-- Slit Line -->
    <line x1="256" y1="210" x2="256" y2="340" stroke="#0A0A0F" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- 3D Layer 3: Right Infinity Loop (Passes In Front of Pen Nib) -->
  <path d="M 256 340 C 312 280 402 280 402 340 C 402 400 312 400 256 340" 
        fill="none" 
        stroke="url(#rightLoopGrad)" 
        stroke-width="26" 
        stroke-linecap="round"
        filter="url(#softGlow)" />

  <!-- Intersection/Overlap Highlight Dot -->
  <circle cx="256" cy="340" r="13" fill="#C8FF00" />
</svg>
